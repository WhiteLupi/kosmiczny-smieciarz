name: Supabase keep-alive ping

# Supabase free-tier projects pause after 7 days of inactivity.
# This cron pings the public REST endpoint every 5 days to keep the project active.
# Endpoint is read-only public (RLS protected), no secrets needed.

on:
  schedule:
    - cron: '0 12 */5 * *' # at 12:00 UTC every 5 days
  workflow_dispatch:        # allow manual run from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (saves count)
        run: |
          set -e
          URL="https://tqsighwbdkzofyjgrpqr.supabase.co/rest/v1/runs?select=id&limit=1"
          KEY="sb_publishable_RHvo0smwYdH-O5-RRaKqxQ_f9VqQCxM"
          response=$(curl -sS -w "\n%{http_code}" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$URL")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "Body: $body"
          if [ "$code" != "200" ]; then
            echo "::error::Supabase ping failed (HTTP $code)"
            exit 1
          fi
          echo "✓ Supabase project alive"
